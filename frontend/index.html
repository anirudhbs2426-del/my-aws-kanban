<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Kanban</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="https://kanban-data-unique-id-2426.s3.eu-north-1.amazonaws.com/OIP+(1).jpg" alt="Cloud Logo" style="width: 100px; height: auto;">
        <h1>AWS Master Kanban</h1>
        <div class="board">
            <div class="column" id="todo" ondrop="drop(event)" ondragover="allowDrop(event)">
                <h3>To Do</h3>
                <div class="card" draggable="true" ondragstart="drag(event)" id="task1">Setup EC2</div>
            </div>
            <div class="column" id="doing" ondrop="drop(event)" ondragover="allowDrop(event)">
                <h3>In Progress</h3>
            </div>
            <div class="column" id="done" ondrop="drop(event)" ondragover="allowDrop(event)">
                <h3>Done</h3>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
